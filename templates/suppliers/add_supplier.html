{% extends 'base.html' %}
{% load static %}
{% block title %}Add Supplier{% endblock %}

{% block breadcrumb %}
<nav class="sf-breadcrumb" aria-label="Breadcrumb">
  <a href="{% url 'dashboard:home' %}">Home</a>
  <span class="sf-breadcrumb__sep" aria-hidden="true">/</span>
  <a href="{% url 'suppliers:supplier_list' %}">Suppliers</a>
  <span class="sf-breadcrumb__sep" aria-hidden="true">/</span>
  <span class="sf-breadcrumb__current">Add</span>
</nav>
{% endblock %}

{% block content %}

<div style="max-width:680px;">

  <h1 class="sf-page-title sf-mb-4">Add supplier</h1>

  <form method="POST" class="sf-card" novalidate>
    {% csrf_token %}
    <div class="sf-card__body">

      <div class="sf-form-grid-2">
        <div class="sf-field sf-form-full">
          <label class="sf-label" for="id_name">
            Supplier name <span class="sf-label__required">*</span>
          </label>
          <input class="sf-input {% if form.name.errors %}has-error{% endif %}"
                 type="text" id="id_name" name="name"
                 value="{{ form.name.value|default:'' }}"
                 placeholder="Supplier or company name" autofocus>
          {% if form.name.errors %}
            <p class="sf-error-text">{{ form.name.errors|join:" " }}</p>
          {% endif %}
        </div>

        <div class="sf-field">
          <label class="sf-label" for="id_email">Email address</label>
          <input class="sf-input" type="email" id="id_email" name="email"
                 value="{{ form.email.value|default:'' }}"
                 placeholder="supplier@email.com">
        </div>

        <div class="sf-field">
          <label class="sf-label" for="id_phone">Phone number</label>
          <input class="sf-input sf-num" type="text" id="id_phone" name="phone"
                 value="{{ form.phone.value|default:'' }}"
                 placeholder="+254 700 000 000">
        </div>

        <div class="sf-field sf-form-full">
          <label class="sf-label" for="id_address">Address</label>
          <textarea class="sf-textarea" id="id_address" name="address"
                    rows="3" placeholder="Physical or postal address">{{ form.address.value|default:'' }}</textarea>
        </div>

        <div class="sf-field sf-form-full">
          <label class="sf-label" for="id_notes">
            Notes <span class="sf-label__optional">(optional)</span>
          </label>
          <textarea class="sf-textarea" id="id_notes" name="notes"
                    rows="3" placeholder="Payment terms, lead times, etc.">{{ form.notes.value|default:'' }}</textarea>
        </div>

        <div class="sf-field sf-form-full" style="margin-bottom:0;">
          <label class="sf-checkbox-label">
            <input type="checkbox" name="is_active" {% if form.is_active.value != False %}checked{% endif %}>
            Mark as active supplier
          </label>
        </div>
      </div>

    </div>
    <div class="sf-card__footer sf-flex sf-justify-between">
      <a href="{% url 'suppliers:supplier_list' %}" class="sf-btn sf-btn--secondary">Cancel</a>
      <button type="submit" class="sf-btn sf-btn--primary">Save supplier</button>
    </div>
  </form>

</div>

{% endblock %}

{% extends 'base.html' %}
{% load static %}
{% block title %}New Category{% endblock %}

{% block breadcrumb %}
<nav class="sf-breadcrumb" aria-label="Breadcrumb">
  <a href="{% url 'dashboard:home' %}">Home</a>
  <span class="sf-breadcrumb__sep" aria-hidden="true">/</span>
  <a href="{% url 'inventory:category_list' %}">Categories</a>
  <span class="sf-breadcrumb__sep" aria-hidden="true">/</span>
  <span class="sf-breadcrumb__current">New</span>
</nav>
{% endblock %}

{% block content %}

<div style="max-width:560px;">

  <h1 class="sf-page-title sf-mb-4">New category</h1>

  <form method="POST" class="sf-card" novalidate>
    {% csrf_token %}
    <div class="sf-card__body">

      <div class="sf-field">
        <label class="sf-label" for="id_name">
          Category name <span class="sf-label__required">*</span>
        </label>
        <input class="sf-input {% if form.name.errors %}has-error{% endif %}"
               type="text" id="id_name" name="name"
               value="{{ form.name.value|default:'' }}"
               placeholder="e.g. Beverages" autofocus>
        {% if form.name.errors %}
          <p class="sf-error-text">{{ form.name.errors|join:" " }}</p>
        {% endif %}
      </div>

      <div class="sf-field" style="margin-bottom:0;">
        <label class="sf-label" for="id_description">
          Description <span class="sf-label__optional">(optional)</span>
        </label>
        <textarea class="sf-textarea" id="id_description" name="description"
                  rows="3" placeholder="What kinds of products belong here?">{{ form.description.value|default:'' }}</textarea>
      </div>

    </div>
    <div class="sf-card__footer sf-flex sf-justify-between">
      <a href="{% url 'inventory:category_list' %}" class="sf-btn sf-btn--secondary">Cancel</a>
      <button type="submit" class="sf-btn sf-btn--primary">Create category</button>
    </div>
  </form>

</div>

{% endblock %}

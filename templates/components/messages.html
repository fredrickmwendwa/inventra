{% if messages %}
  <div aria-hidden="true" style="display:none;">
    {% for message in messages %}
      <span class="sf-dj-message"
        data-type="{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}">
        {{ message }}
      </span>
    {% endfor %}
  </div>
{% endif %}

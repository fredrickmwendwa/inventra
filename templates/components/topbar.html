<header class="sf-topbar">
  <div class="sf-topbar__left">


    <form
      action="{% url 'accounts:profile' %}"
      method="get"
      class="sf-topbar__search"
      role="search"
    >
      <span class="sf-topbar__search-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle
            cx="11"
            cy="11"
            r="7"
            stroke="currentColor"
            stroke-width="1.8"
          />
          <path
            d="M21 21l-4.3-4.3"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <input
        type="search"
        name="q"
        placeholder="Search products, suppliers, customers…"
        aria-label="Search StockFlow"
      />
    </form>
  </div>

        <div class="sf-topbar__right">

          <!-- Tenant pill -->
          {% if tenant %}
            <div class="sf-tenant-pill" aria-label="Active workspace: {{ tenant.name }}">
              <span class="sf-tenant-pill__dot" aria-hidden="true"></span>
              {{ tenant.name }}
            </div>
          {% endif %}

          <!-- Theme toggle -->
          <button type="button"
                  class="sf-icon-btn"
                  data-theme-toggle
                  aria-label="Toggle dark mode"
                  title="Toggle dark mode">
            <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"
                    stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          </button>

          <!-- User menu -->
          <div style="position:relative;">
            <button type="button"
                    class="sf-user-menu"
                    data-dropdown-trigger="sf-user-dropdown"
                    aria-haspopup="true"
                    aria-expanded="false"
                    aria-label="User menu">
              {% if user_profile and user_profile.avatar %}
                <img src="{{ user_profile.avatar.url }}"
                     alt="{{ request.user.get_full_name }}"
                     class="sf-user-menu__avatar"
                     style="object-fit:cover;">
              {% else %}
                <div class="sf-user-menu__avatar" aria-hidden="true">
                  {{ request.user.first_name|first|upper }}
                </div>
              {% endif %}
              <span class="sf-user-menu__meta">
                <span class="sf-user-menu__name">
                  {{ request.user.get_full_name|default:request.user.username }}
                </span>
                <span class="sf-user-menu__role">
                  {{ user_profile.role|default:"staff" }} · {{ tenant.name|default:"" }}
                </span>
              </span>
            </button>

            <div class="sf-dropdown" id="sf-user-dropdown" role="menu">
              <div class="sf-dropdown__header">
                <div class="sf-dropdown__header-name">
                  {{ request.user.get_full_name|default:request.user.username }}
                </div>
                <div class="sf-dropdown__header-sub">{{ request.user.email }}</div>
              </div>
              <a href="{% url 'accounts:profile' %}"
                 class="sf-dropdown__item" role="menuitem">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.7"/>
                  <path d="M4 20a8 8 0 0116 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
                My profile
              </a>
              <a href="{% url 'accounts:staff_list' %}"
                 class="sf-dropdown__item" role="menuitem">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.7"/>
                  <path d="M4.5 20c0-3.6 3.4-6 7.5-6s7.5 2.4 7.5 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
                Team members
              </a>
              <div class="sf-dropdown__divider"></div>
              <a href="{% url 'tenants:logout' %}"
                 class="sf-dropdown__item sf-dropdown__item--danger" role="menuitem">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
                        stroke="currentColor" stroke-width="1.7"
                        stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Sign out
              </a>
            </div>
          </div>

        </div>
</header>
